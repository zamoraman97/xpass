<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600" role="img" aria-label="Códigos digitales">
  <defs>
    <linearGradient id="hbBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0e1f12"/>
      <stop offset="1" stop-color="#0a0c10"/>
    </linearGradient>
    <linearGradient id="hbCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#16181f"/>
      <stop offset="1" stop-color="#0d0f14"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="600" fill="url(#hbBg)"/>
  <circle cx="980" cy="120" r="320" fill="#107C10" opacity="0.16"/>
  <circle cx="1080" cy="460" r="220" fill="#1e6fff" opacity="0.10"/>
  <circle cx="760" cy="520" r="180" fill="#ff7a18" opacity="0.08"/>
  <!-- Floating brand cards -->
  <g transform="translate(700 90) rotate(-8)">
    <rect width="180" height="112" rx="14" fill="url(#hbCard)" stroke="rgba(74,222,128,.35)" stroke-width="2"/>
    <circle cx="40" cy="40" r="20" fill="none" stroke="#4ade80" stroke-width="4"/>
    <path d="M28 28 Q40 38 52 56 M52 28 Q40 38 28 56" stroke="#4ade80" stroke-width="4" fill="none" stroke-linecap="round"/>
    <text x="22" y="92" font-family="Inter,Arial" font-size="15" font-weight="800" fill="#fff">Xbox</text>
  </g>
  <g transform="translate(910 200) rotate(7)">
    <rect width="180" height="112" rx="14" fill="url(#hbCard)" stroke="rgba(255,90,90,.4)" stroke-width="2"/>
    <rect x="26" y="26" width="40" height="40" rx="7" fill="#e2231a"/>
    <rect x="40" y="40" width="12" height="12" rx="2" fill="#0d0f14"/>
    <text x="22" y="92" font-family="Inter,Arial" font-size="15" font-weight="800" fill="#fff">Robux</text>
  </g>
  <g transform="translate(720 320) rotate(5)">
    <rect width="180" height="112" rx="14" fill="url(#hbCard)" stroke="rgba(127,176,255,.4)" stroke-width="2"/>
    <path d="M30 24 L78 52 L30 80 Z" fill="#00e0ff"/>
    <path d="M44 38 L78 52 L44 66 L56 52 Z" fill="#ff4d5e"/>
    <text x="22" y="100" font-family="Inter,Arial" font-size="14" font-weight="800" fill="#fff">Google Play</text>
  </g>
  <g transform="translate(940 400) rotate(-6)">
    <rect width="180" height="112" rx="14" fill="url(#hbCard)" stroke="rgba(127,233,255,.4)" stroke-width="2"/>
    <path d="M46 24 L70 42 L46 80 L22 42 Z" fill="#7fe9ff"/>
    <text x="22" y="100" font-family="Inter,Arial" font-size="14" font-weight="800" fill="#fff">Free Fire</text>
